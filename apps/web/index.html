<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aedventure Local Office</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%231e4f55'/%3E%3Ccircle cx='8' cy='8' r='4' fill='%23ffffff'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/src/browser/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="world-panel" aria-label="Local office demo">
        <div class="toolbar">
          <div>
            <p class="eyebrow">Customer app layer</p>
            <h1>Local Virtual Office</h1>
          </div>
          <div class="toolbar-actions">
            <button id="start" type="button">Join demo</button>
            <button id="reset" type="button" disabled>Reset</button>
          </div>
        </div>

        <div class="status-grid">
          <div>
            <span>Session</span>
            <strong id="session-status">idle</strong>
          </div>
          <div>
            <span>World</span>
            <strong id="world-status">not joined</strong>
          </div>
          <div>
            <span>Media</span>
            <strong id="media-status">not issued</strong>
          </div>
        </div>

        <div id="map" class="map" aria-label="Office map"></div>

        <div class="controls" aria-label="Movement controls">
          <button data-direction="up" type="button">↑</button>
          <button data-direction="left" type="button">←</button>
          <button data-direction="right" type="button">→</button>
          <button data-direction="down" type="button">↓</button>
        </div>

        <form id="chat-form" class="chat">
          <input
            id="chat-body"
            name="chat-body"
            autocomplete="off"
            value="Hello from the browser shell"
          />
          <button type="submit">Send</button>
        </form>

        <ol id="events" class="events" aria-label="Event log"></ol>
      </section>
    </main>

    <script type="module" src="/src/browser/main.ts"></script>
  </body>
</html>
