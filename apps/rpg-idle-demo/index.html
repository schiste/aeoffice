<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPG Idle Demo</title>
    <script type="module" src="/src/browser/main.ts"></script>
  </head>
  <body>
    <main id="app" class="rpg-shell">
      <section class="world-panel" aria-label="Grove Outpost">
        <div class="world-toolbar">
          <div>
            <p class="eyebrow">Shared engine demo</p>
            <h1>Grove Outpost</h1>
          </div>
          <div class="toolbar-actions" aria-label="World view controls">
            <button id="zoom-out" class="icon-button" type="button" title="Zoom out">-</button>
            <button id="zoom-reset" class="pill-button" type="button">100%</button>
            <button id="zoom-in" class="icon-button" type="button" title="Zoom in">+</button>
          </div>
        </div>
        <div id="world" class="world-host" aria-label="Playable RPG world"></div>
      </section>

      <aside class="side-panel" aria-label="RPG idle controls">
        <section class="panel-section">
          <div class="section-header">
            <p class="eyebrow">Hero</p>
            <span id="zone-status" class="status-pill">Outside grove</span>
          </div>
          <div class="hero-row">
            <div class="hero-token" aria-hidden="true"></div>
            <div>
              <h2>Scout</h2>
              <p id="hero-status">Ready near the old path.</p>
            </div>
          </div>
        </section>

        <section class="panel-section">
          <div class="section-header">
            <p class="eyebrow">Resources</p>
            <span id="wood-count" class="resource-count">0 wood</span>
          </div>
          <button id="gather-action" class="primary-action" type="button" disabled>
            Gather wood
          </button>
          <p id="action-status" class="status-line">Walk into the grove to gather.</p>
        </section>

        <section class="panel-section compact">
          <div class="section-header">
            <p class="eyebrow">Site</p>
            <span id="build-status" class="status-pill subtle">Foundation</span>
          </div>
          <p class="status-line">
            The outpost site is blocked terrain for now; upgrades come later.
          </p>
        </section>

        <section class="panel-section compact">
          <p class="eyebrow">Controls</p>
          <div class="control-grid" aria-label="Movement controls">
            <button class="move-button" data-move-x="0" data-move-y="-1" data-facing="up" type="button">W</button>
            <button class="move-button" data-move-x="-1" data-move-y="0" data-facing="left" type="button">A</button>
            <button class="move-button" data-move-x="0" data-move-y="1" data-facing="down" type="button">S</button>
            <button class="move-button" data-move-x="1" data-move-y="0" data-facing="right" type="button">D</button>
          </div>
          <div class="secondary-actions">
            <button id="run-toggle" class="pill-button" type="button">Walk</button>
            <button id="reset-demo" class="pill-button" type="button">Reset</button>
          </div>
        </section>
      </aside>
    </main>
  </body>
</html>
