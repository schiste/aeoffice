# Local development coturn skeleton.
# Production deployments must inject secrets through environment or a secret
# manager, not commit static credentials.
# If this file is used directly, render the placeholders before startup.

listening-port=3478
tls-listening-port=5349
fingerprint
use-auth-secret
static-auth-secret=${COTURN_STATIC_AUTH_SECRET}
realm=${COTURN_REALM}
server-name=${COTURN_REALM}
no-cli
no-multicast-peers
no-loopback-peers
stale-nonce=600
