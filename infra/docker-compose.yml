name: aedventure

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aedventure}
      POSTGRES_USER: ${POSTGRES_USER:-aedventure}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../apps/api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: ${VALKEY_IMAGE:-valkey/valkey:7-alpine}
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  livekit:
    image: ${LIVEKIT_IMAGE:-livekit/livekit-server:latest}
    command: ["--dev", "--bind", "0.0.0.0"]
    ports:
      - "${LIVEKIT_HTTP_PORT:-7880}:7880"
      - "${LIVEKIT_RTC_TCP_PORT:-7881}:7881"
      - "${LIVEKIT_RTC_UDP_PORT_START:-50000}-${LIVEKIT_RTC_UDP_PORT_END:-50100}:50000-50100/udp"
    depends_on:
      valkey:
        condition: service_healthy

  coturn:
    image: ${COTURN_IMAGE:-coturn/coturn:latest}
    command:
      [
        "-n",
        "--listening-port=3478",
        "--tls-listening-port=5349",
        "--fingerprint",
        "--use-auth-secret",
        "--static-auth-secret=${COTURN_STATIC_AUTH_SECRET:-local_dev_turn_secret}",
        "--realm=${COTURN_REALM:-localhost}",
        "--server-name=${COTURN_REALM:-localhost}",
        "--min-port=${COTURN_MIN_PORT:-49160}",
        "--max-port=${COTURN_MAX_PORT:-49200}",
        "--no-cli",
        "--no-multicast-peers",
        "--no-loopback-peers",
        "--stale-nonce=600",
      ]
    ports:
      - "${COTURN_PORT:-3478}:3478/tcp"
      - "${COTURN_PORT:-3478}:3478/udp"
      - "${COTURN_TLS_PORT:-5349}:5349/tcp"
      - "${COTURN_MIN_PORT:-49160}-${COTURN_MAX_PORT:-49200}:49160-49200/udp"

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-local_dev_minio_password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  valkey-data:
  minio-data:
